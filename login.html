<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | ServiceHub Cebu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <img class="brand-mark" src="logo.png" alt="ServiceHub Cebu logo">
      <span class="brand-text">ServiceHub Cebu</span>
    </div>
    <nav class="top-nav" aria-label="Primary">
      <a href="index.html">Back to Website</a>
    </nav>
  </header>

  <main class="auth-main">
    <section class="auth-card">
      <h1>Admin Login</h1>
      <p>Use your authorized admin email and password.</p>

      <form id="loginForm" class="auth-form">
        <label>
          <span>Email</span>
          <input id="email" type="email" required autocomplete="email">
        </label>

        <label>
          <span>Password</span>
          <input id="password" type="password" required autocomplete="current-password">
        </label>

        <p id="loginMessage" class="report-feedback" aria-live="polite"></p>

        <button id="loginBtn" class="solid-btn" type="submit">Login to Admin</button>
      </form>
    </section>
  </main>

  <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
  <script src="login.js"></script>
</body>
</html>
